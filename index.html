<!DOCTYPE html>
<html lang="th" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />

  <!-- ===== SEO ===== -->
  <title>คลังสื่อ ครูหนังสือ — สื่อการเรียนรู้ออนไลน์</title>
  <meta name="description" content="คลังสื่อออนไลน์สำหรับนักเรียนชั้น ม.1 รวบรวมรูปภาพและสื่อการเรียนรู้ครบครัน โดยครูหนังสือ" />
  <meta name="keywords" content="คลังสื่อ, สื่อการเรียนรู้, ครูหนังสือ, ม.1, ออนไลน์" />
  <meta name="author" content="ครูหนังสือ" />
  <meta name="robots" content="index, follow" />

  <!-- ===== PWA ===== -->
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#7C3AED" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="คลังสื่อ" />

  <!-- Apple Touch Icons -->
  <link rel="apple-touch-icon" href="./icons/icon-192.svg" />

  <!-- Open Graph -->
  <meta property="og:title" content="คลังสื่อ ครูหนังสือ" />
  <meta property="og:description" content="คลังสื่อออนไลน์สำหรับนักเรียน ม.1 โดยครูหนังสือ" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="th_TH" />

  <!-- ===== Fonts & CSS ===== -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap"
  />
  <link rel="stylesheet" href="./style.css" />
</head>

<body>

  <!-- ===================================================
       HEADER
  =================================================== -->
  <header class="header" role="banner">
    <div class="header-inner">
      <!-- Logo -->
      <a class="header-logo" href="./index.html" aria-label="หน้าหลัก คลังสื่อ ครูหนังสือ">
        <div class="logo-icon" aria-hidden="true">📚</div>
        <div class="logo-text">
          <span class="logo-title">คลังสื่อ ครูหนังสือ</span>
          <span class="logo-subtitle">สื่อการเรียนรู้ออนไลน์</span>
        </div>
      </a>

      <!-- Search -->
      <div class="search-wrapper" role="search">
        <span class="search-icon" aria-hidden="true">🔍</span>
        <label for="searchInput" class="visually-hidden">ค้นหาสื่อ</label>
        <input
          type="search"
          id="searchInput"
          placeholder="ค้นหาสื่อ..."
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
          aria-label="ค้นหาสื่อการเรียนรู้"
        />
      </div>
    </div>
  </header>

  <!-- ===================================================
       STATS BAR
  =================================================== -->
  <div class="stats-bar" role="status" aria-live="polite">
    <span>📋 พบสื่อทั้งหมด</span>
    <span class="stats-count" id="resultCount">--</span>
    <span>รายการ</span>
  </div>

  <!-- ===================================================
       MAIN CONTENT
  =================================================== -->
  <main class="main-content" id="main" role="main">
    <h1 class="section-title">
      <span aria-hidden="true">🌟</span> สื่อการเรียนรู้ทั้งหมด
    </h1>

    <!-- Card Grid — filled by app.js -->
    <div
      id="cardGrid"
      class="card-grid"
      role="list"
      aria-label="รายการสื่อการเรียนรู้"
    ></div>
  </main>

  <!-- ===================================================
       FOOTER
  =================================================== -->
  <footer class="footer" role="contentinfo">
    <p>สร้างด้วย ❤️ โดย <strong>ครูหนังสือ</strong> • ระบบคลังสื่อออนไลน์</p>
  </footer>

  <!-- ===================================================
       LIGHTBOX / MODAL
  =================================================== -->
  <div
    id="lightboxOverlay"
    class="lightbox-overlay"
    role="dialog"
    aria-modal="true"
    aria-label="แสดงรูปขนาดใหญ่"
    aria-hidden="true"
  >
    <div class="lightbox-inner" role="document">
      <button
        id="lightboxClose"
        class="lightbox-close"
        aria-label="ปิดรูป"
        title="ปิด (ESC)"
      >✕</button>
      <img
        id="lightboxImg"
        class="lightbox-img"
        src=""
        alt=""
      />
      <iframe
        id="lightboxIframe"
        class="lightbox-iframe hidden"
        src=""
        allowfullscreen
        title="Canva Viewer"
      ></iframe>
      <p id="lightboxCaption" class="lightbox-caption"></p>
    </div>
  </div>

  <!-- ===================================================
       PWA INSTALL BANNER
  =================================================== -->
  <div id="installBanner" class="install-banner" role="alert" aria-live="polite">
    <span aria-hidden="true" style="font-size:1.8rem;">📲</span>
    <div class="install-text">
      ติดตั้งเป็นแอปได้เลย!
      <span>เพิ่มลงหน้าจอหลักโทรศัพท์</span>
    </div>
    <button id="btnInstall" class="btn-install" aria-label="ติดตั้งแอป">ติดตั้ง</button>
    <button id="btnDismiss" class="btn-dismiss" aria-label="ปิดแจ้งเตือน">✕</button>
  </div>

  <!-- ===================================================
       SCROLL TO TOP
  =================================================== -->
  <button id="btnTop" class="btn-top" aria-label="กลับขึ้นด้านบน" title="ขึ้นด้านบน">
    ⬆️
  </button>

  <!-- ===================================================
       VISUALLY HIDDEN UTILITY (accessibility)
  =================================================== -->
  <style>
    .visually-hidden {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }
  </style>

  <!-- ===== Helper Functions (inline — must be before app.js) ===== -->
  <script>
    // HTML escape utility used by app.js
    function escapeHTML(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function escapeAttr(str) {
      if (!str) return '';
      return String(str).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
  </script>

  <!-- ===== Main JavaScript ===== -->
  <script src="./app.js" defer></script>

</body>
</html>
